name: Fetch Prologue of Ohrid

on:
  workflow_dispatch:
  # Uncomment to run automatically every day at 3:00 AM ET
  # schedule:
  #   - cron: '0 8 * * *'

jobs:
  scrape:
    name: Scrape & Commit Prologue JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Run Prologue scraper
        run: node fetch-prologue.js

      - name: Commit monthly prologue files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/prologue-*.json
          git diff --staged --quiet || git commit -m "chore: update prologue JSON files [$(date -u '+%Y-%m-%d')]"
          git push
