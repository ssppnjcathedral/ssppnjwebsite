name: Fetch OCA Saints Daily

on:
  workflow_dispatch:  # manual trigger
  schedule:
    - cron: '0 3 1 1 *'  # auto-run every Jan 1 at 3am UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Run scraper
        run: node fetch-oca-saints-daily.js

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/oca-saints-*.json
          git diff --cached --quiet || git commit -m "chore: update OCA saints data $(date +%Y-%m-%d)"
          git push
