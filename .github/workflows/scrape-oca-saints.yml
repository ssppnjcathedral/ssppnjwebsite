name: Scrape OCA Saints

on:
  workflow_dispatch:   # run manually from GitHub UI whenever you want

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install node-fetch

      - run: node fetch-oca-saints.js

      - name: Commit JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add oca-saints-*.json
          git diff --cached --quiet || git commit -m "Update OCA saints data"
          git push
