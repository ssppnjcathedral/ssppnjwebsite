# Netlify configuration — Saints Peter & Paul Orthodox Cathedral

[build]
  publish = "."

# Security + performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Ensure JS files are served with correct MIME type
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# Ensure JSON files are served with correct MIME type
[[headers]]
  for = "/*.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"

[[redirects]]
  from = "/about-our-church"
  to = "/our-parish"
  status = 301

[[redirects]]
  from = "/catechesis-series"
  to = "/catechesis"
  status = 301

[[redirects]]
  from = "/about-liturgy"
  to = "/liturgy-history"
  status = 301

# Redirect /donate to /give (old page -> new hub)
[[redirects]]
  from = "/donate"
  to = "/give"
  status = 301

