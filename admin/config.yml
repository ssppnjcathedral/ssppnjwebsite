backend:
  name: git-gateway
  branch: main

media_folder: images/gallery
public_folder: /images/gallery

site_url: https://ssppnjtest.netlify.app

collections:

  # ── GALLERY PHOTOS ──────────────────────────────────
  - name: gallery
    label: Gallery Photos
    label_singular: Photo
    folder: _data/gallery
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - label: Photo
        name: src
        widget: image
        media_folder: /images/gallery
        public_folder: /images/gallery
        hint: Upload your photo here
      - label: Title
        name: title
        widget: string
        hint: e.g. "Children with candles on Palm Sunday"
      - label: Caption Label
        name: label
        widget: string
        hint: e.g. "Community · Palm Sunday"
      - label: Category
        name: cat
        widget: select
        options:
          - { label: Community, value: community }
          - { label: Cathedral, value: cathedral }
          - { label: Events, value: events }
      - label: Year
        name: year
        widget: select
        options:
          - { label: "2026", value: "2026" }
          - { label: "2025", value: "2025" }
          - { label: "2024", value: "2024" }
          - { label: Pre-2023, value: pre2023 }
      - label: Card Height
        name: h
        widget: number
        default: 160
        value_type: int
        min: 128
        max: 220
        hint: "Height of the photo card (128-220). Vary for masonry effect."

  # ── BULLETINS ───────────────────────────────────────
  - name: bulletins
    label: Bulletins
    label_singular: Bulletin
    folder: _data/bulletins
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    extension: json
    format: json
    fields:
      - label: Title
        name: title
        widget: string
        hint: e.g. "Sunday of the Prodigal Son"
      - label: Date
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: MMMM D, YYYY
        time_format: false
      - label: PDF File
        name: pdf
        widget: file
        media_folder: /files/bulletins
        public_folder: /files/bulletins
        hint: Upload the bulletin PDF
      - label: Notes
        name: notes
        widget: string
        required: false
        hint: Optional — any notes about this bulletin

  # ── NEWS & ANNOUNCEMENTS ────────────────────────────
  - name: news
    label: News & Announcements
    label_singular: Announcement
    folder: _data/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: json
    format: json
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: MMMM D, YYYY
        time_format: false
      - label: Category
        name: category
        widget: select
        options:
          - Announcement
          - Event
          - Service
          - Community
      - label: Body
        name: body
        widget: markdown
        hint: The full text of the announcement
      - label: Featured Image
        name: image
        widget: image
        required: false
        media_folder: /images/news
        public_folder: /images/news
