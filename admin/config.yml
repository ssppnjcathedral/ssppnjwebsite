backend:
  name: git-gateway
  branch: main

media_folder: "images/events"
public_folder: "/images/events"


collections:
  - name: "parish-events"
    label: "Parish Events"
    label_singular: "Event"
    description: "Add, edit, and manage parish services, community events, concerts, and announcements. Toggle 'Featured' to pin any event to the top of the homepage regardless of date."
    files:
      - name: "all-events"
        label: "All Events"
        file: "_data/parish-events.json"
        fields:
          - name: events
            label: Events
            label_singular: Event
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - name: id
                label: ID
                widget: string
                hint: "Unique identifier, no spaces (e.g. presanctified-apr-1). Used internally."

              - name: active
                label: Active (show on site)
                widget: boolean
                default: true
                hint: "Turn off to hide this event without deleting it."

              - name: featured
                label: Featured (sticky to homepage)
                widget: boolean
                default: false
                hint: "Pin this event to the top of the Coming Up section on the homepage, regardless of date. Use for major events you want to stay prominent."

              - name: title
                label: Event Title
                widget: string
                hint: "e.g. Presanctified Liturgy, Spring Food Drive, Men's Breakfast"

              - name: subtitle
                label: Subtitle
                widget: string
                required: false
                hint: "Optional short line under the title. e.g. 'An evening of sacred music'"

              - name: type
                label: Event Type
                widget: select
                options:
                  - { label: "Liturgy (Divine Liturgy, Presanctified, etc.)", value: "liturgy" }
                  - { label: "Vespers", value: "vespers" }
                  - { label: "Community (food drives, outreach, etc.)", value: "community" }
                  - { label: "Social (men's group, women's group, outings)", value: "social" }
                  - { label: "Concert / Music", value: "concert" }
                  - { label: "Announcement", value: "announcement" }
                hint: "Determines the color badge shown on the homepage and schedule page."

              - name: date
                label: Date
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "The date of the event."

              - name: time
                label: Time
                widget: string
                hint: "e.g. 6:30 PM, After Divine Liturgy (~12:00 PM)"

              - name: location
                label: Location
                widget: string
                default: "Cathedral Nave · 111 Grand Street"
                hint: "Where the event takes place."

              - name: contact
                label: Contact / Organizer
                widget: string
                required: false
                hint: "e.g. Parish Office, Fr. Solomon Longo, Diaconal Ministry"

              - name: description
                label: Description
                widget: text
                hint: "Full description shown on the event detail page. 2-4 sentences is ideal."

              - name: image
                label: Event Image
                widget: image
                required: false
                hint: "Optional image for the event card on the schedule page."

              - name: link
                label: External Link
                widget: string
                required: false
                hint: "Optional URL if the event has an external registration page or more info."

  - name: "bulletins"
    label: "Weekly Bulletins"
    label_singular: "Bulletin"
    description: "Create and manage weekly parish bulletins. Readings, saints, and tone auto-populate from the liturgical calendar by date. Only the authored sections need to be filled in each week."
    files:
      - name: "all-bulletins"
        label: "All Bulletins"
        file: "bulletins.json"
        fields:
          - name: bulletins
            label: Bulletins
            label_singular: Bulletin
            widget: list
            summary: "{{fields.date}} — {{fields.reflection_title}}"
            fields:
              - name: date
                label: "Bulletin Date"
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "Select the Sunday date for this bulletin."

              - name: reflection_title
                label: Reflection Title
                widget: string
                required: false
                hint: "Optional internal title for the reflection article (not displayed in bulletin)."

              - name: reflection_body
                label: Reflection Body
                widget: markdown
                hint: "Fr. Solomon's reflection article for page 1. Appears in two columns with a drop cap on the first letter. Please keep under 850 characters. Longer reflections will be automatically trimmed."

              - name: featured_image
                label: "Cover Image (Page 1)"
                widget: image
                required: false
                media_folder: "/images/bulletins"
                hint: "Cover image for page 1. BEFORE uploading, crop to exactly 1358 x 810 pixels (landscape). Use Figma: (1) Drag your image into the pre-created 1358x810 frame. (2) Resize the image to fill the frame. (3) Hold Cmd and drag the image border to crop to your subject. (4) Press Export."

              - name: featured_image_caption
                label: Cover Image Caption
                widget: string
                required: false
                hint: "Short caption shown in the bottom-right corner of the cover image."

              - name: saint_icon_image
                label: "Saint Icon (Page 2 — right rail)"
                widget: image
                required: false
                media_folder: "/images/bulletins"
                hint: "Saint icon for page 2 right rail. BEFORE uploading, crop to exactly 480 x 650 pixels (portrait). Use Figma: (1) Drag your image into the pre-created 480x650 frame. (2) Resize the image to fill the frame. (3) Hold Cmd and drag the image border to center on the saint's face. (4) Press Export."

              - name: saint_icon_caption
                label: Saint Icon Caption
                widget: string
                required: false
                hint: "Example: Saint Wenceslaus"

              - name: show_second_image
                label: "Show second image on Page 2 (if space allows)"
                widget: boolean
                default: false
                hint: "Toggle on if the troparia text is short and you have a second image to fill the rail. The system will only show it if there is enough room."

              - name: second_image
                label: "Second Image (Page 2)"
                widget: image
                required: false
                media_folder: "/images/bulletins"

              - name: second_image_caption
                label: Second Image Caption
                widget: string
                required: false

              - name: show_epistle
                label: "Show Epistle Reading"
                widget: boolean
                default: true
                hint: "Toggle off to hide the Epistle reading on page 2."

              - name: show_gospel
                label: "Show Gospel Reading"
                widget: boolean
                default: true
                hint: "Toggle off to hide the Gospel reading on page 2."

              - name: show_troparia
                label: "Show Troparia"
                widget: boolean
                default: true
                hint: "Toggle off to hide the Troparia section on page 2."

              - name: troparia_text
                label: "Troparia (Page 2 — right rail)"
                widget: markdown
                required: false
                hint: "Sunday troparia and kontakion. Can be copied from oca.org. Each stanza as its own paragraph."

              - name: thank_you_line
                label: "Thank You (Page 3)"
                widget: string
                required: false
                hint: "Example: Thank you to Team A for Coffee Hour."

              - name: special_announcements
                label: "Special Announcements (Page 3)"
                widget: list
                required: false
                summary: "{{fields.title}}"
                fields:
                  - name: title
                    label: Title
                    widget: string
                    hint: "Bold lead-in. Example: Fr. Solomon on Vacation"
                  - name: body
                    label: Body
                    widget: text

              - name: patristic_quotes
                label: "Patristic Quotes (Page 4)"
                widget: list
                required: false
                hint: "1 or 2 patristic quotes shown on the tear-off page."
                summary: "{{fields.attribution}}"
                fields:
                  - name: quote
                    label: Quote
                    widget: text
                  - name: attribution
                    label: Attribution
                    widget: string
                    hint: "Example: On the Veneration of the Cross, St Theodore the Studite"

  - name: "prayer-list"
    label: "Prayer List"
    description: "The parish prayer list. Carries forward week to week automatically. Only update when names need to be added or removed. The list appears on every bulletin's page 3."
    files:
      - name: "prayer-list"
        label: "Prayer List"
        file: "prayer-list.json"
        fields:
          - name: names
            label: Names
            label_singular: Name
            widget: list
            hint: "One name per entry. The list carries forward to every bulletin automatically."
            field:
              name: name
              label: Name
              widget: string
              hint: "Example: Nancy, Aidan W.'s mother | Example: Victims of war in Ukraine"
