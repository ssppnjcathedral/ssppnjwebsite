backend:
  name: git-gateway
  branch: main

media_folder: "images/events"
public_folder: "/images/events"

publish_mode: editorial_workflow

collections:
  - name: "parish-events"
    label: "Parish Events"
    label_singular: "Event"
    description: "Add, edit, and manage parish services, community events, concerts, and announcements. Toggle 'Featured' to pin any event to the top of the homepage regardless of date."
    files:
      - name: "all-events"
        label: "All Events"
        file: "_data/parish-events.json"
        fields:
          - name: events
            label: Events
            label_singular: Event
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - name: id
                label: ID
                widget: string
                hint: "Unique identifier, no spaces (e.g. presanctified-apr-1). Used internally."

              - name: active
                label: Active (show on site)
                widget: boolean
                default: true
                hint: "Turn off to hide this event without deleting it."

              - name: featured
                label: Featured (sticky to homepage)
                widget: boolean
                default: false
                hint: "Pin this event to the top of the Coming Up section on the homepage, regardless of date. Use for major events you want to stay prominent."

              - name: title
                label: Event Title
                widget: string
                hint: "e.g. Presanctified Liturgy, Spring Food Drive, Men's Breakfast"

              - name: subtitle
                label: Subtitle
                widget: string
                required: false
                hint: "Optional short line under the title. e.g. 'An evening of sacred music'"

              - name: type
                label: Event Type
                widget: select
                options:
                  - { label: "Liturgy (Divine Liturgy, Presanctified, etc.)", value: "liturgy" }
                  - { label: "Vespers", value: "vespers" }
                  - { label: "Community (food drives, outreach, etc.)", value: "community" }
                  - { label: "Social (men's group, women's group, outings)", value: "social" }
                  - { label: "Concert / Music", value: "concert" }
                  - { label: "Announcement", value: "announcement" }
                hint: "Determines the color badge shown on the homepage and schedule page."

              - name: date
                label: Date
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "The date of the event."

              - name: time
                label: Time
                widget: string
                hint: "e.g. 6:30 PM, After Divine Liturgy (~12:00 PM)"

              - name: location
                label: Location
                widget: string
                default: "Cathedral Nave · 111 Grand Street"
                hint: "Where the event takes place."

              - name: contact
                label: Contact / Organizer
                widget: string
                required: false
                hint: "e.g. Parish Office, Fr. Solomon Longo, Diaconal Ministry"

              - name: description
                label: Description
                widget: text
                hint: "Full description shown on the event detail page. 2-4 sentences is ideal."

              - name: image
                label: Event Image
                widget: image
                required: false
                hint: "Optional image for the event card on the schedule page."

              - name: link
                label: External Link
                widget: string
                required: false
                hint: "Optional URL if the event has an external registration page or more info."
