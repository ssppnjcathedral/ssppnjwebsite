<style>
:root{--vellum:#F6F1E8;--maroon:#7B1D2A;--apse:#3B0F18;--gold:#B88328;--stone:#7A6648;--ink:#2C1F16;--f-display:'Cormorant Garamond',Georgia,serif;--f-body:'EB Garamond',Georgia,serif;--f-ui:'Cinzel',Georgia,serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--vellum);color:var(--ink);font-family:var(--f-body);font-size:19px;line-height:1.75;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;-webkit-font-smoothing:antialiased}

.wrap{max-width:540px;text-align:center}

h1{font-family:var(--f-display);font-weight:300;font-size:clamp(2.5rem,6vw,4rem);line-height:1;color:var(--maroon);margin-bottom:1rem}
p{color:var(--stone);max-width:38ch;margin:0 auto 2rem}
.nav-links{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-bottom:2.5rem}
.nav-links a{font-family:var(--f-ui);font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--maroon);padding:.55rem 1.2rem;border:1px solid var(--maroon);transition:all .2s}
.nav-links a:hover{background:var(--maroon);color:var(--vellum)}
.address{font-family:var(--f-ui);font-size:.7rem;letter-spacing:.10em;text-transform:uppercase;color:var(--stone);line-height:2}
.rule{width:40px;height:1px;background:var(--gold);margin:2rem auto}
</style>
</head>
